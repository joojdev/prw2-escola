info:
  name: Logar usuário
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/login"
  body:
    type: json
    data: |-
      {
        "username": "joao.vitor",
        "password": "abcd1234"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const jwt = res.getBody()?.jwt;

        if (jwt) {
          bru.setEnvVar("jwt_token", jwt);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
